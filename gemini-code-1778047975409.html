<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    
    <style>
      body { background-color: #f8f9fa; padding: 20px; }
      .dashboard-card { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
      #loader { display: flex; justify-content: center; align-items: center; height: 200px; }
    </style>

    <script type="text/javascript">
      // Load the Visualization API and the corechart/table packages.
      google.charts.load('current', {'packages':['corechart', 'table']});
      google.charts.setOnLoadCallback(fetchData);

      function fetchData() {
        // This calls the 'getSheetData' function in your Code.gs file
        google.script.run
          .withSuccessHandler(drawDashboard)
          .withFailureHandler(showError)
          .getSheetData();
      }

      function drawDashboard(data) {
        if (!data || data.length < 2) {
          document.getElementById('loader').innerHTML = "No data found in 'Main data' sheet.";
          return;
        }

        var dataTable = google.visualization.arrayToDataTable(data);

        // 1. Draw the Column Chart
        var chart = new google.visualization.ColumnChart(document.getElementById('chart_div'));
        chart.draw(dataTable, {
          title: 'Main Data Performance',
          hAxis: {title: data[0][0]}, // Uses your first header
          vAxis: {title: 'Values'},
          legend: { position: 'bottom' },
          animation: { startup: true, duration: 1000, easing: 'out' }
        });

        // 2. Draw the Table
        var table = new google.visualization.Table(document.getElementById('table_div'));
        table.draw(dataTable, {showRowNumber: true, width: '100%', height: '100%'});

        // Hide loader once done
        document.getElementById('loader').style.display = 'none';
      }

      function showError(err) {
        document.getElementById('loader').innerHTML = '<div class="alert alert-danger">Error: ' + err.message + '</div>';
      }
    </script>
  </head>
  <body>

    <div class="container">
      <div class="row">
        <div class="col-12">
          <div class="dashboard-card border-primary border-top">
            <div class="d-flex justify-content-between align-items-center">
              <h2 class="text-primary m-0">Business Insights Dashboard</h2>
              <button onclick="location.reload()" class="btn btn-outline-primary btn-sm">Refresh Dashboard</button>
            </div>
            <p class="text-muted">Live Data from Sheet: <strong>Main data</strong></p>
          </div>
        </div>
      </div>

      <div id="loader">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <div class="row">
        <div class="col-md-7">
          <div class="dashboard-card">
            <h5 class="text-secondary mb-3">Visual Analysis</h5>
            <div id="chart_div" style="width: 100%; height: 400px;"></div>
          </div>
        </div>

        <div class="col-md-5">
          <div class="dashboard-card">
            <h5 class="text-secondary mb-3">Raw Data View</h5>
            <div id="table_div"></div>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
