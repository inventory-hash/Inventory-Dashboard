<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart', 'table']});
      google.charts.setOnLoadCallback(drawDashboard);

      function drawDashboard() {
        // This runs the function from Code.gs
        google.script.run.withSuccessHandler(function(data) {
          var dataTable = google.visualization.arrayToDataTable(data);

          // 1. Create a Bar Chart
          var chart = new google.visualization.BarChart(document.getElementById('chart_div'));
          chart.draw(dataTable, {title: 'Data Visual', height: 400});

          // 2. Create a Table
          var table = new google.visualization.Table(document.getElementById('table_div'));
          table.draw(dataTable, {showRowNumber: true, width: '100%'});
        }).getSheetData();
      }
    </script>
  </head>
  <body class="bg-light p-4">
    <div class="container bg-white shadow rounded p-4">
      <h2 class="text-primary border-bottom pb-2">Main Data Dashboard</h2>
      <div id="chart_div" class="my-4"></div>
      <div id="table_div"></div>
    </div>
  </body>
</html>
